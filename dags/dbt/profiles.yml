# profiles.yml — dbt-fabric connection profiles
# ===============================================
# Authentication uses managed identity (MSI).
# The Fabric Airflow job's workspace identity is used automatically —
# no credentials need to be set.
#
# Requires: DBT_WAREHOUSE_SERVER env var (set by medallion_pipeline.py from env_config)

fabric_medallion:
  target: dev
  outputs:
    dev:
      type: fabric
      driver: "ODBC Driver 18 for SQL Server"
      server: "{{ env_var('DBT_WAREHOUSE_SERVER') }}"
      port: 1433
      database: gold_warehouse
      schema: gold
      authentication: msi
      encrypt: true
      trust_cert: false
      connect_timeout: 30

    prod:
      type: fabric
      driver: "ODBC Driver 18 for SQL Server"
      server: "{{ env_var('DBT_WAREHOUSE_SERVER') }}"
      port: 1433
      database: gold_warehouse
      schema: gold
      authentication: msi
      encrypt: true
      trust_cert: false
      connect_timeout: 30
