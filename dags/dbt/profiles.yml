# profiles.yml — dbt-fabric connection profiles
# ===============================================
# Authentication uses managed identity (MSI) in Airflow, CLI auth for local runs.
# Run `az login` before running dbt locally.

fabric_medallion:
  target: dev
  outputs:
    dev:
      type: fabric
      driver: "ODBC Driver 18 for SQL Server"
      server: "vqe76lj3fobedgktfnki4dilhe-nopdcmjyvbduth5qimxxhi5eyi.datawarehouse.fabric.microsoft.com"
      port: 1433
      database: gold_warehouse
      schema: gold
      authentication: msi
      encrypt: true
      trust_cert: false
      connect_timeout: 30

    prod:
      type: fabric
      driver: "ODBC Driver 18 for SQL Server"
      server: "vqe76lj3fobedgktfnki4dilhe-nopdcmjyvbduth5qimxxhi5eyi.datawarehouse.fabric.microsoft.com"
      port: 1433
      database: gold_warehouse
      schema: gold
      authentication: msi
      encrypt: true
      trust_cert: false
      connect_timeout: 30

