subjects:

  - subject: carrier_invoice
    dag_id: medallion_carrier_invoice
    cron: "0 6 * * *"
    description: Daily morning carrier invoice ingestion
    sources:
      - source_name: fedex_direct_invoice
        carrier: fedex
        landing_path: landing/fedex/invoice/
        bronze_path: bronze/fedex/invoice/
        file_format: csv
        silver1_table: staging_fedex_direct_invoice
        silver2_table: silver_carrier_invoice
        extra_params:
          date_format: "%m/%d/%Y"
        is_enabled: true
        environment: dev

      - source_name: dhl_direct_invoice
        carrier: dhl
        landing_path: landing/dhl/invoice/
        bronze_path: bronze/dhl/invoice/
        file_format: csv
        silver1_table: staging_dhl_direct_invoice
        silver2_table: silver_carrier_invoice
        extra_params:
          date_format: "%d/%m/%Y"
        is_enabled: true
        environment: dev

      - source_name: ups_carrier_report
        carrier: ups
        landing_path: landing/ups/carrier/
        bronze_path: bronze/ups/carrier/
        file_format: excel
        silver1_table: staging_ups_carrier_report
        silver2_table: silver_carrier_invoice
        extra_params:
          sheet: Invoice
          date_format: "%Y-%m-%d"
        is_enabled: true
        environment: dev

  - subject: carrier_tracking
    dag_id: medallion_carrier_tracking
    cron: "0 * * * *"
    description: Hourly near-real-time tracking feeds
    sources:
      - source_name: usps_tracking
        carrier: usps
        landing_path: landing/usps/tracking/
        bronze_path: bronze/usps/tracking/
        file_format: parquet
        silver1_table: staging_usps_tracking
        silver2_table: silver_carrier_tracking
        is_enabled: true
        environment: dev

  - subject: rate_card
    dag_id: medallion_rate_card
    cron: "0 6 * * 0"
    description: Weekly Sunday rate card refresh
    sources:
      - source_name: fedex_rate_card
        carrier: fedex
        landing_path: landing/fedex/rate_card/
        bronze_path: bronze/fedex/rate_card/
        file_format: excel
        silver1_table: staging_fedex_rate_card
        silver2_table: silver_carrier_rate_card
        extra_params:
          sheet: Rates
          date_format: "%Y-%m-%d"
        is_enabled: true
        environment: dev

gold_tables:

  - dag_id: gold_fact_invoice
    dbt_model: fact_invoice
    wait_for:
      - dag_id: medallion_carrier_invoice
        silver2_table: silver_carrier_invoice

  - dag_id: gold_dim_carrier
    dbt_model: dim_carrier
    wait_for:
      - dag_id: medallion_rate_card
        silver2_table: silver_carrier_rate_card

      # - dag_id: medallion_carrier_tracking
      #   silver2_table: silver_carrier_tracking
